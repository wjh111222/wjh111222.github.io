<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">J Cut 与 L Cut 声画剪辑示意</title>
  <desc id="desc">展示声音先于画面进入，以及声音延续到下一个画面的时间线结构。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="arrowBlue" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#2563eb"/>
    </marker>
    <marker id="arrowPink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#db2777"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="600" y="65" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="700">声音不必和画面同时切换</text>
  <text x="600" y="103" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">声音先行负责“带过去”，声音延续负责“留住情绪”</text>

  <g font-family="Microsoft YaHei, PingFang SC, sans-serif">
    <rect x="60" y="145" width="520" height="440" rx="26" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="115" cy="195" r="28" fill="#2563eb"/>
    <text x="115" y="205" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">J</text>
    <text x="160" y="203" fill="#1e3a8a" font-size="28" font-weight="700">J Cut：声音先进入</text>
    <text x="100" y="248" fill="#475569" font-size="17">下一个场景的声音先出现，画面稍后才切换</text>

    <text x="105" y="315" fill="#334155" font-size="18" font-weight="700">画面轨</text>
    <rect x="190" y="280" width="175" height="58" rx="8" fill="#94a3b8"/>
    <text x="278" y="316" text-anchor="middle" fill="#fff" font-size="17">场景 A</text>
    <rect x="365" y="280" width="160" height="58" rx="8" fill="#3b82f6"/>
    <text x="445" y="316" text-anchor="middle" fill="#fff" font-size="17">场景 B</text>
    <text x="105" y="405" fill="#334155" font-size="18" font-weight="700">声音轨</text>
    <rect x="190" y="370" width="105" height="58" rx="8" fill="#94a3b8"/>
    <text x="243" y="406" text-anchor="middle" fill="#fff" font-size="16">A 声音</text>
    <rect x="295" y="370" width="230" height="58" rx="8" fill="#2563eb"/>
    <text x="410" y="406" text-anchor="middle" fill="#fff" font-size="16">B 声音提前进入</text>
    <line x1="365" y1="265" x2="365" y2="445" stroke="#0f172a" stroke-width="3" stroke-dasharray="7 7"/>
    <path d="M320 455v55h90" fill="none" stroke="#2563eb" stroke-width="4" marker-end="url(#arrowBlue)"/>
    <text x="330" y="542" text-anchor="middle" fill="#1e40af" font-size="17" font-weight="700">声音先带观众进入新空间</text>

    <rect x="620" y="145" width="520" height="440" rx="26" fill="#fff" stroke="#cbd5e1" stroke-width="2"/>
    <circle cx="675" cy="195" r="28" fill="#db2777"/>
    <text x="675" y="205" text-anchor="middle" fill="#fff" font-size="26" font-weight="700">L</text>
    <text x="720" y="203" fill="#831843" font-size="28" font-weight="700">L Cut：声音继续保留</text>
    <text x="660" y="248" fill="#475569" font-size="17">画面已经进入下一场，上一场声音仍然延续</text>

    <text x="665" y="315" fill="#334155" font-size="18" font-weight="700">画面轨</text>
    <rect x="750" y="280" width="175" height="58" rx="8" fill="#94a3b8"/>
    <text x="838" y="316" text-anchor="middle" fill="#fff" font-size="17">场景 A</text>
    <rect x="925" y="280" width="160" height="58" rx="8" fill="#ec4899"/>
    <text x="1005" y="316" text-anchor="middle" fill="#fff" font-size="17">场景 B</text>
    <text x="665" y="405" fill="#334155" font-size="18" font-weight="700">声音轨</text>
    <rect x="750" y="370" width="245" height="58" rx="8" fill="#db2777"/>
    <text x="873" y="406" text-anchor="middle" fill="#fff" font-size="16">A 声音延续</text>
    <rect x="995" y="370" width="90" height="58" rx="8" fill="#f9a8d4"/>
    <text x="1040" y="406" text-anchor="middle" fill="#831843" font-size="15">B 声音</text>
    <line x1="925" y1="265" x2="925" y2="445" stroke="#0f172a" stroke-width="3" stroke-dasharray="7 7"/>
    <path d="M970 455v55h-90" fill="none" stroke="#db2777" stroke-width="4" marker-end="url(#arrowPink)"/>
    <text x="890" y="542" text-anchor="middle" fill="#9d174d" font-size="17" font-weight="700">画面先走，声音保留情绪联系</text>
  </g>
  <rect x="225" y="610" width="750" height="44" rx="22" fill="#0f172a"/>
  <text x="600" y="639" text-anchor="middle" fill="#f8fafc" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19" font-weight="700">声画错开之后，转场会从“翻页”变成“流动”</text>
</svg>
