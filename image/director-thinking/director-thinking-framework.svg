<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">导演思维的四层设计框架</title>
  <desc id="desc">从内容目标依次转化为空间关系、镜头选择和观众感受。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#23324b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000" flood-opacity=".25"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#93c5fd"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <circle cx="1040" cy="80" r="180" fill="#14b8a6" opacity=".08"/>
  <circle cx="100" cy="620" r="220" fill="#f59e0b" opacity=".07"/>
  <text x="600" y="72" text-anchor="middle" fill="#f8fafc" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="700">导演思维：把抽象意图变成观众感受</text>
  <text x="600" y="112" text-anchor="middle" fill="#a7b4c8" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">每一层都在回答一个更具体的问题</text>

  <g filter="url(#shadow)" font-family="Microsoft YaHei, PingFang SC, sans-serif">
    <rect x="60" y="190" width="230" height="300" rx="26" fill="#fff7ed"/>
    <circle cx="175" cy="255" r="42" fill="#fb923c"/>
    <path d="M157 255h36M175 237v36" stroke="#fff" stroke-width="8" stroke-linecap="round"/>
    <text x="175" y="335" text-anchor="middle" fill="#7c2d12" font-size="27" font-weight="700">1. 内容目标</text>
    <text x="175" y="377" text-anchor="middle" fill="#9a3412" font-size="18">这场戏为什么存在？</text>
    <text x="175" y="414" text-anchor="middle" fill="#9a3412" font-size="18">核心信息是什么？</text>
    <text x="175" y="451" text-anchor="middle" fill="#9a3412" font-size="18">人物要发生什么变化？</text>

    <rect x="350" y="190" width="230" height="300" rx="26" fill="#ecfeff"/>
    <circle cx="465" cy="255" r="42" fill="#14b8a6"/>
    <path d="M443 270h44v-30h-44zM465 240v30" fill="none" stroke="#fff" stroke-width="6" stroke-linejoin="round"/>
    <text x="465" y="335" text-anchor="middle" fill="#134e4a" font-size="27" font-weight="700">2. 空间关系</text>
    <text x="465" y="377" text-anchor="middle" fill="#115e59" font-size="18">人物站在哪里？</text>
    <text x="465" y="414" text-anchor="middle" fill="#115e59" font-size="18">谁靠近，谁远离？</text>
    <text x="465" y="451" text-anchor="middle" fill="#115e59" font-size="18">环境如何参与叙事？</text>

    <rect x="640" y="190" width="230" height="300" rx="26" fill="#eff6ff"/>
    <circle cx="755" cy="255" r="42" fill="#3b82f6"/>
    <rect x="728" y="237" width="54" height="36" rx="7" fill="none" stroke="#fff" stroke-width="6"/>
    <circle cx="755" cy="255" r="9" fill="#fff"/>
    <path d="M782 246l18-10v38l-18-10z" fill="#fff"/>
    <text x="755" y="335" text-anchor="middle" fill="#1e3a8a" font-size="27" font-weight="700">3. 镜头选择</text>
    <text x="755" y="377" text-anchor="middle" fill="#1e40af" font-size="18">观众从哪里看？</text>
    <text x="755" y="414" text-anchor="middle" fill="#1e40af" font-size="18">何时靠近或切换？</text>
    <text x="755" y="451" text-anchor="middle" fill="#1e40af" font-size="18">先展示什么信息？</text>

    <rect x="930" y="190" width="230" height="300" rx="26" fill="#fdf2f8"/>
    <circle cx="1045" cy="255" r="42" fill="#ec4899"/>
    <path d="M1024 258c13 18 29 18 42 0M1029 242h1M1060 242h1" stroke="#fff" stroke-width="7" stroke-linecap="round" fill="none"/>
    <text x="1045" y="335" text-anchor="middle" fill="#831843" font-size="27" font-weight="700">4. 观众感受</text>
    <text x="1045" y="377" text-anchor="middle" fill="#9d174d" font-size="18">观众此刻知道什么？</text>
    <text x="1045" y="414" text-anchor="middle" fill="#9d174d" font-size="18">心理距离如何变化？</text>
    <text x="1045" y="451" text-anchor="middle" fill="#9d174d" font-size="18">最终留下什么情绪？</text>
  </g>

  <g stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)" opacity=".9">
    <path d="M300 340h35"/>
    <path d="M590 340h35"/>
    <path d="M880 340h35"/>
  </g>
  <rect x="234" y="548" width="732" height="72" rx="36" fill="#0f172a" stroke="#475569"/>
  <text x="600" y="592" text-anchor="middle" fill="#e2e8f0" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="22" font-weight="700">导演不是“多拍几个镜头”，而是让四层选择指向同一个表达目标</text>
</svg>
