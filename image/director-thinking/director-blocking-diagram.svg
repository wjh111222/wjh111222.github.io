<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">双人对话场面的导演调度示意</title>
  <desc id="desc">俯视图展示关系轴线、三个机位和人物走位如何共同表达关系变化。</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fafc"/>
      <stop offset="1" stop-color="#e2e8f0"/>
    </linearGradient>
    <marker id="blueArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#2563eb"/>
    </marker>
    <marker id="orangeArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12Z" fill="#ea580c"/>
    </marker>
  </defs>
  <rect width="1200" height="675" fill="url(#bg2)"/>
  <text x="600" y="60" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="34" font-weight="700">人物调度 + 机位选择 = 可见的人物关系</text>
  <text x="600" y="96" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18">俯视示意：同一场对话，站位改变就是关系改变</text>

  <rect x="75" y="130" width="760" height="475" rx="24" fill="#ffffff" stroke="#cbd5e1" stroke-width="3"/>
  <rect x="105" y="160" width="700" height="415" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="2"/>
  <rect x="135" y="190" width="165" height="90" rx="10" fill="#d6d3d1"/>
  <text x="218" y="242" text-anchor="middle" fill="#57534e" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18">桌子 / 环境障碍</text>
  <rect x="665" y="185" width="110" height="150" rx="8" fill="#bae6fd" stroke="#38bdf8"/>
  <text x="720" y="265" text-anchor="middle" fill="#075985" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18">窗</text>
  <rect x="650" y="505" width="125" height="40" rx="8" fill="#fed7aa" stroke="#fb923c"/>
  <text x="713" y="532" text-anchor="middle" fill="#9a3412" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="17">出口</text>

  <line x1="335" y1="355" x2="625" y2="355" stroke="#ef4444" stroke-width="5" stroke-dasharray="12 10"/>
  <text x="480" y="335" text-anchor="middle" fill="#b91c1c" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="18" font-weight="700">人物关系轴线</text>
  <circle cx="355" cy="355" r="40" fill="#0ea5e9"/>
  <text x="355" y="364" text-anchor="middle" fill="#fff" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700">甲</text>
  <circle cx="605" cy="355" r="40" fill="#f97316"/>
  <text x="605" y="364" text-anchor="middle" fill="#fff" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="24" font-weight="700">乙</text>

  <path d="M355 420C410 475 515 495 605 430" fill="none" stroke="#ea580c" stroke-width="5" marker-end="url(#orangeArrow)"/>
  <text x="480" y="500" text-anchor="middle" fill="#9a3412" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="17" font-weight="700">乙靠近甲：距离缩短，压力或亲密感增强</text>

  <g font-family="Microsoft YaHei, PingFang SC, sans-serif" font-weight="700">
    <path d="M288 535l24-17 24 17v25h-48z" fill="#1e293b"/>
    <circle cx="312" cy="536" r="8" fill="#93c5fd"/>
    <text x="312" y="592" text-anchor="middle" fill="#1e293b" font-size="18">A 全景</text>
    <path d="M410 555l24-17 24 17v25h-48z" fill="#1e293b"/>
    <circle cx="434" cy="556" r="8" fill="#93c5fd"/>
    <text x="434" y="617" text-anchor="middle" fill="#1e293b" font-size="18">B 甲近景</text>
    <path d="M530 555l24-17 24 17v25h-48z" fill="#1e293b"/>
    <circle cx="554" cy="556" r="8" fill="#93c5fd"/>
    <text x="554" y="617" text-anchor="middle" fill="#1e293b" font-size="18">C 乙近景</text>
  </g>
  <path d="M312 520L450 390" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#blueArrow)"/>
  <path d="M434 540L570 392" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#blueArrow)"/>
  <path d="M554 540L390 392" stroke="#2563eb" stroke-width="3" stroke-dasharray="7 7" marker-end="url(#blueArrow)"/>

  <rect x="875" y="150" width="270" height="430" rx="24" fill="#0f172a"/>
  <text x="1010" y="205" text-anchor="middle" fill="#fff" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="25" font-weight="700">导演判断清单</text>
  <g font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">
    <circle cx="915" cy="260" r="17" fill="#22c55e"/><text x="915" y="267" text-anchor="middle" fill="#fff" font-weight="700">1</text>
    <text x="947" y="267" fill="#e2e8f0">先建立两人位置</text>
    <circle cx="915" cy="325" r="17" fill="#22c55e"/><text x="915" y="332" text-anchor="middle" fill="#fff" font-weight="700">2</text>
    <text x="947" y="332" fill="#e2e8f0">保持视线方向</text>
    <circle cx="915" cy="390" r="17" fill="#22c55e"/><text x="915" y="397" text-anchor="middle" fill="#fff" font-weight="700">3</text>
    <text x="947" y="397" fill="#e2e8f0">让走位产生变化</text>
    <circle cx="915" cy="455" r="17" fill="#22c55e"/><text x="915" y="462" text-anchor="middle" fill="#fff" font-weight="700">4</text>
    <text x="947" y="462" fill="#e2e8f0">关键时刻再靠近</text>
    <circle cx="915" cy="520" r="17" fill="#22c55e"/><text x="915" y="527" text-anchor="middle" fill="#fff" font-weight="700">5</text>
    <text x="947" y="527" fill="#e2e8f0">越轴必须有动机</text>
  </g>
</svg>
