<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">六种自然转场方法</title>
  <desc id="desc">按连接依据展示动作、视线、形状、遮挡、声音和色彩六种转场。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#0f172a"/><stop offset="1" stop-color="#312e81"/></linearGradient>
    <filter id="s" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="8" stdDeviation="9" flood-color="#000" flood-opacity=".28"/></filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <text x="600" y="64" text-anchor="middle" fill="#fff" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="700">自然转场的核心：找到两个场景的共同点</text>
  <text x="600" y="103" text-anchor="middle" fill="#c4b5fd" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">共同点越清楚，转场越流畅；差异越有意义，转场越有表达力</text>
  <g font-family="Microsoft YaHei, PingFang SC, sans-serif" filter="url(#s)">
    <g transform="translate(80 155)"><rect width="310" height="185" rx="22" fill="#eff6ff"/><circle cx="58" cy="58" r="34" fill="#2563eb"/><path d="M40 58h36m-12-12l12 12-12 12" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/><text x="110" y="55" fill="#1e3a8a" font-size="26" font-weight="700">动作匹配</text><text x="110" y="87" fill="#3b82f6" font-size="17">用同一运动连接</text><text x="35" y="135" fill="#475569" font-size="17">抬手 → 下一场继续抬手</text><text x="35" y="164" fill="#64748b" font-size="16">方向、速度和落点要一致</text></g>
    <g transform="translate(445 155)"><rect width="310" height="185" rx="22" fill="#ecfeff"/><circle cx="58" cy="58" r="34" fill="#0891b2"/><circle cx="58" cy="58" r="17" fill="none" stroke="#fff" stroke-width="6"/><circle cx="58" cy="58" r="5" fill="#fff"/><text x="110" y="55" fill="#164e63" font-size="26" font-weight="700">视线匹配</text><text x="110" y="87" fill="#0891b2" font-size="17">用观看关系连接</text><text x="35" y="135" fill="#475569" font-size="17">人物看向画外 → 展示对象</text><text x="35" y="164" fill="#64748b" font-size="16">观众会自然追随目光</text></g>
    <g transform="translate(810 155)"><rect width="310" height="185" rx="22" fill="#fff7ed"/><circle cx="58" cy="58" r="34" fill="#ea580c"/><rect x="40" y="44" width="36" height="28" rx="4" fill="none" stroke="#fff" stroke-width="5"/><circle cx="58" cy="58" r="9" fill="#fff"/><text x="110" y="55" fill="#7c2d12" font-size="26" font-weight="700">形状匹配</text><text x="110" y="87" fill="#ea580c" font-size="17">用轮廓或构图连接</text><text x="35" y="135" fill="#475569" font-size="17">圆形杯口 → 圆形月亮</text><text x="35" y="164" fill="#64748b" font-size="16">适合跨越时间与空间</text></g>
    <g transform="translate(80 385)"><rect width="310" height="185" rx="22" fill="#fdf2f8"/><circle cx="58" cy="58" r="34" fill="#db2777"/><path d="M39 42h38v32H39zM45 48l26 20" fill="none" stroke="#fff" stroke-width="5"/><text x="110" y="55" fill="#831843" font-size="26" font-weight="700">遮挡转场</text><text x="110" y="87" fill="#db2777" font-size="17">用满屏遮挡隐藏切点</text><text x="35" y="135" fill="#475569" font-size="17">人物经过镜头 → 新场景移出</text><text x="35" y="164" fill="#64748b" font-size="16">遮挡方向需前后对应</text></g>
    <g transform="translate(445 385)"><rect width="310" height="185" rx="22" fill="#f0fdf4"/><circle cx="58" cy="58" r="34" fill="#16a34a"/><path d="M40 58h7l6-13v26l7-34v42l7-26 5 5h5" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/><text x="110" y="55" fill="#14532d" font-size="26" font-weight="700">声音转场</text><text x="110" y="87" fill="#16a34a" font-size="17">用声场提前或延续</text><text x="35" y="135" fill="#475569" font-size="17">先听海浪 → 再切海边</text><text x="35" y="164" fill="#64748b" font-size="16">画面变了，情绪仍连续</text></g>
    <g transform="translate(810 385)"><rect width="310" height="185" rx="22" fill="#faf5ff"/><circle cx="58" cy="58" r="34" fill="#9333ea"/><circle cx="50" cy="55" r="14" fill="#fde047"/><circle cx="66" cy="61" r="14" fill="#60a5fa" opacity=".9"/><text x="110" y="55" fill="#581c87" font-size="26" font-weight="700">色彩匹配</text><text x="110" y="87" fill="#9333ea" font-size="17">用主色与光线连接</text><text x="35" y="135" fill="#475569" font-size="17">暖色灯光 → 日出天空</text><text x="35" y="164" fill="#64748b" font-size="16">视觉情绪先于地点变化</text></g>
  </g>
  <rect x="255" y="605" width="690" height="42" rx="21" fill="#fff" opacity=".1"/>
  <text x="600" y="634" text-anchor="middle" fill="#e2e8f0" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">转场不是装饰，而是前后两个段落之间的逻辑桥梁</text>
</svg>
