<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">动作匹配转场三步法</title><desc id="desc">用动作准备、遮挡切换和动作完成解释自然动作转场。</desc>
  <defs><linearGradient id="b" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#f8fafc"/><stop offset="1" stop-color="#dbeafe"/></linearGradient><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#2563eb"/></marker></defs>
  <rect width="1200" height="675" fill="url(#b)"/>
  <text x="600" y="64" text-anchor="middle" fill="#0f172a" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="700">动作匹配转场：让运动穿过剪辑点</text>
  <text x="600" y="103" text-anchor="middle" fill="#64748b" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">示例：人物关上办公室门，下一镜在家中推开冰箱门</text>
  <g font-family="Microsoft YaHei, PingFang SC, sans-serif">
    <g transform="translate(55 150)"><rect width="330" height="365" rx="22" fill="#fff" stroke="#bfdbfe" stroke-width="3"/><rect x="25" y="25" width="280" height="205" rx="10" fill="#334155"/><rect x="185" y="45" width="100" height="185" fill="#1e293b" stroke="#94a3b8" stroke-width="4"/><circle cx="205" cy="140" r="7" fill="#fbbf24"/><circle cx="105" cy="120" r="30" fill="#f59e0b"/><rect x="83" y="148" width="44" height="70" rx="14" fill="#f59e0b"/><path d="M125 165l74-22" stroke="#f59e0b" stroke-width="16" stroke-linecap="round"/><path d="M250 110v72" stroke="#60a5fa" stroke-width="7" marker-end="url(#a)"/><text x="165" y="275" text-anchor="middle" fill="#1e3a8a" font-size="25" font-weight="700">① 动作准备</text><text x="165" y="313" text-anchor="middle" fill="#475569" font-size="18">明确方向、速度和主体位置</text><text x="165" y="345" text-anchor="middle" fill="#64748b" font-size="16">门向画面右侧关闭</text></g>
    <g transform="translate(435 150)"><rect width="330" height="365" rx="22" fill="#fff" stroke="#bfdbfe" stroke-width="3"/><rect x="25" y="25" width="280" height="205" rx="10" fill="#0f172a"/><rect x="25" y="25" width="272" height="205" fill="#1e293b"/><rect x="297" y="25" width="8" height="205" fill="#60a5fa"/><line x1="165" y1="45" x2="165" y2="210" stroke="#ef4444" stroke-width="4" stroke-dasharray="9 8"/><text x="165" y="115" text-anchor="middle" fill="#fff" font-size="21" font-weight="700">画面接近满屏遮挡</text><text x="165" y="148" text-anchor="middle" fill="#94a3b8" font-size="17">此处切换场景</text><text x="165" y="275" text-anchor="middle" fill="#1e3a8a" font-size="25" font-weight="700">② 隐藏切点</text><text x="165" y="313" text-anchor="middle" fill="#475569" font-size="18">在运动最快、遮挡最大时切</text><text x="165" y="345" text-anchor="middle" fill="#64748b" font-size="16">观众注意动作，不注意场景变化</text></g>
    <g transform="translate(815 150)"><rect width="330" height="365" rx="22" fill="#fff" stroke="#bfdbfe" stroke-width="3"/><rect x="25" y="25" width="280" height="205" rx="10" fill="#fef3c7"/><rect x="45" y="45" width="110" height="185" fill="#e5e7eb" stroke="#94a3b8" stroke-width="4"/><rect x="155" y="45" width="130" height="185" fill="#dbeafe" stroke="#94a3b8" stroke-width="4"/><circle cx="175" cy="140" r="7" fill="#64748b"/><circle cx="245" cy="118" r="30" fill="#fb923c"/><rect x="223" y="147" width="44" height="70" rx="14" fill="#fb923c"/><path d="M226 165l-56-22" stroke="#fb923c" stroke-width="16" stroke-linecap="round"/><path d="M125 110v72" stroke="#60a5fa" stroke-width="7" marker-end="url(#a)"/><text x="165" y="275" text-anchor="middle" fill="#1e3a8a" font-size="25" font-weight="700">③ 延续动作</text><text x="165" y="313" text-anchor="middle" fill="#475569" font-size="18">保持运动方向与速度连续</text><text x="165" y="345" text-anchor="middle" fill="#64748b" font-size="16">新场景的门继续向右移动</text></g>
  </g>
  <path d="M392 333h30" stroke="#2563eb" stroke-width="5" marker-end="url(#a)"/><path d="M772 333h30" stroke="#2563eb" stroke-width="5" marker-end="url(#a)"/>
  <rect x="205" y="560" width="790" height="72" rx="36" fill="#0f172a"/><text x="600" y="590" text-anchor="middle" fill="#fff" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="21" font-weight="700">三项连续：运动方向一致 · 动作速度接近 · 主体位置对应</text><text x="600" y="617" text-anchor="middle" fill="#93c5fd" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="17">切点越接近动作峰值，转场越不容易被察觉</text>
</svg>
