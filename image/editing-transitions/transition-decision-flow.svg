<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">转场选择决策流程</title><desc id="desc">根据时间空间、动作、视线、声音与造型关系选择合适转场。</desc>
  <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#111827"/><stop offset="1" stop-color="#164e63"/></linearGradient><marker id="ar" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0 0L12 6L0 12Z" fill="#67e8f9"/></marker></defs>
  <rect width="1200" height="675" fill="url(#g)"/>
  <text x="600" y="60" text-anchor="middle" fill="#fff" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="36" font-weight="700">转场选择：先判断叙事关系，再选择形式</text>
  <text x="600" y="98" text-anchor="middle" fill="#a5f3fc" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="19">不要先找特效，先问前后两个场景为什么要连接</text>
  <g font-family="Microsoft YaHei, PingFang SC, sans-serif">
    <rect x="410" y="135" width="380" height="76" rx="38" fill="#0891b2"/><text x="600" y="181" text-anchor="middle" fill="#fff" font-size="24" font-weight="700">前后场景之间有什么联系？</text>
    <path d="M600 212v48M600 260H190v45M600 260H410v45M600 260h220v45M600 260h410v45" fill="none" stroke="#67e8f9" stroke-width="4" marker-end="url(#ar)"/>
    <g transform="translate(60 310)"><rect width="260" height="120" rx="20" fill="#eff6ff"/><text x="130" y="43" text-anchor="middle" fill="#1e3a8a" font-size="21" font-weight="700">动作正在继续？</text><text x="130" y="78" text-anchor="middle" fill="#475569" font-size="17">方向与速度能够对应</text><text x="130" y="104" text-anchor="middle" fill="#2563eb" font-size="17" font-weight="700">→ 动作 / 遮挡转场</text></g>
    <g transform="translate(340 310)"><rect width="260" height="120" rx="20" fill="#ecfeff"/><text x="130" y="43" text-anchor="middle" fill="#164e63" font-size="21" font-weight="700">人物正在观看？</text><text x="130" y="78" text-anchor="middle" fill="#475569" font-size="17">下一个镜头是所见对象</text><text x="130" y="104" text-anchor="middle" fill="#0891b2" font-size="17" font-weight="700">→ 视线匹配</text></g>
    <g transform="translate(620 310)"><rect width="260" height="120" rx="20" fill="#f0fdf4"/><text x="130" y="43" text-anchor="middle" fill="#14532d" font-size="21" font-weight="700">声音能够跨场？</text><text x="130" y="78" text-anchor="middle" fill="#475569" font-size="17">声源、台词或情绪连续</text><text x="130" y="104" text-anchor="middle" fill="#16a34a" font-size="17" font-weight="700">→ J Cut / L Cut</text></g>
    <g transform="translate(900 310)"><rect width="260" height="120" rx="20" fill="#fff7ed"/><text x="130" y="43" text-anchor="middle" fill="#7c2d12" font-size="21" font-weight="700">造型存在呼应？</text><text x="130" y="78" text-anchor="middle" fill="#475569" font-size="17">形状、色彩或构图相似</text><text x="130" y="104" text-anchor="middle" fill="#ea580c" font-size="17" font-weight="700">→ 视觉匹配</text></g>
    <path d="M190 435v62M470 435v62M750 435v62M1030 435v62" stroke="#67e8f9" stroke-width="4" marker-end="url(#ar)"/>
    <rect x="90" y="510" width="1020" height="105" rx="26" fill="#0f172a" stroke="#475569" stroke-width="2"/>
    <text x="600" y="550" text-anchor="middle" fill="#fff" font-size="23" font-weight="700">如果没有明确联系，就用直接切换</text>
    <text x="600" y="583" text-anchor="middle" fill="#cbd5e1" font-size="18">硬切并不低级；清楚、准确、不过度解释，往往比复杂特效更专业</text>
  </g>
  <text x="600" y="650" text-anchor="middle" fill="#67e8f9" font-family="Microsoft YaHei, PingFang SC, sans-serif" font-size="17">转场成立的标准：观众理解关系，而不是注意到技巧</text>
</svg>
